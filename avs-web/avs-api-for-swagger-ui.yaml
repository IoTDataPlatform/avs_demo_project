openapi: 3.0.3
info:
  title: AVS Backend API
  version: 1.0.0

servers:
  - url: http://localhost:8084/api

tags:
  - name: Overview
  - name: Directory
  - name: Rooms
  - name: Sensors

paths:
  /overview:
    get:
      tags: [Overview]
      operationId: getOverview
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverviewResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /buildings:
    get:
      tags: [Directory]
      operationId: getBuildings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildingsResponse"

  /rooms:
    get:
      tags: [Directory]
      operationId: getRooms
      parameters:
        - name: buildingId
          in: query
          required: false
          schema:
            type: string
            example: bld_main
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomsResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rooms/{roomKey}/sensors:
    get:
      tags: [Directory]
      operationId: getRoomSensors
      parameters:
        - $ref: "#/components/parameters/roomKey"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SensorsResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rooms/{roomKey}/current:
    get:
      tags: [Rooms]
      operationId: getRoomCurrent
      parameters:
        - $ref: "#/components/parameters/roomKey"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomCurrentResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rooms/{roomKey}/aggregates:
    get:
      tags: [Rooms]
      operationId: getRoomAggregates
      parameters:
        - $ref: "#/components/parameters/roomKey"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomAggregatesResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rooms/{roomKey}/series:
    get:
      tags: [Rooms]
      operationId: getRoomSeries
      parameters:
        - $ref: "#/components/parameters/roomKey"
        - $ref: "#/components/parameters/from"
        - $ref: "#/components/parameters/to"
        - name: step
          in: query
          required: false
          schema:
            type: string
            enum: [minute, hour, day, month]
            default: hour
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rooms/{roomKey}/stats:
    get:
      tags: [Rooms]
      operationId: getRoomStats
      parameters:
        - $ref: "#/components/parameters/roomKey"
        - $ref: "#/components/parameters/from"
        - $ref: "#/components/parameters/to"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sensors/{sensorId}/current:
    get:
      tags: [Sensors]
      operationId: getSensorCurrent
      parameters:
        - $ref: "#/components/parameters/sensorId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SensorCurrentResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sensors/{sensorId}/series:
    get:
      tags: [Sensors]
      operationId: getSensorSeries
      parameters:
        - $ref: "#/components/parameters/sensorId"
        - $ref: "#/components/parameters/from"
        - $ref: "#/components/parameters/to"
        - name: step
          in: query
          required: false
          schema:
            type: string
            enum: [minute, hour, day, month]
            default: hour
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sensors/{sensorId}/stats:
    get:
      tags: [Sensors]
      operationId: getSensorStats
      parameters:
        - $ref: "#/components/parameters/sensorId"
        - $ref: "#/components/parameters/from"
        - $ref: "#/components/parameters/to"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  parameters:
    roomKey:
      name: roomKey
      in: path
      required: true
      schema:
        type: string
        example: Rectorate|412

    sensorId:
      name: sensorId
      in: path
      required: true
      schema:
        type: string
        example: sensor_282

    from:
      name: from
      in: query
      required: true
      schema:
        type: string
        format: date-time
        example: "2026-04-01T00:00:00Z"

    to:
      name: to
      in: query
      required: true
      schema:
        type: string
        format: date-time
        example: "2026-04-19T23:59:59Z"

  schemas:
    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string

    BuildingDto:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          example: bld_rectorate
        name:
          type: string
          example: Rectorate

    BuildingsResponse:
      type: object
      required: [buildings]
      properties:
        buildings:
          type: array
          items:
            $ref: "#/components/schemas/BuildingDto"

    ParamStatus:
      type: string
      enum: [normal, warning, critical, excellent]

    OverallStatus:
      type: string
      enum: [normal, warning, critical, excellent]

    RoomCardDto:
      type: object
      required:
        - roomKey
        - buildingId
        - buildingName
        - roomNumber
        - sensorId
        - ts
        - co2
        - temperature
        - humidity
        - co2Status
        - temperatureStatus
        - humidityStatus
        - overallAirStatus
      properties:
        roomKey:
          type: string
          example: Rectorate|412
        buildingId:
          type: string
          example: bld_rectorate
        buildingName:
          type: string
          example: Rectorate
        roomNumber:
          type: string
          example: "412"
        sensorId:
          type: string
          example: sensor_282
        ts:
          type: string
        co2:
          type: integer
        temperature:
          type: number
          format: double
        humidity:
          type: number
          format: double
        co2Status:
          $ref: "#/components/schemas/ParamStatus"
        temperatureStatus:
          $ref: "#/components/schemas/ParamStatus"
        humidityStatus:
          $ref: "#/components/schemas/ParamStatus"
        overallAirStatus:
          $ref: "#/components/schemas/OverallStatus"

    RoomsResponse:
      type: object
      required: [rooms]
      properties:
        rooms:
          type: array
          items:
            $ref: "#/components/schemas/RoomCardDto"

    SensorDto:
      type: object
      required: [sensorId]
      properties:
        sensorId:
          type: string
          example: sensor_282

    SensorsResponse:
      type: object
      required: [roomKey, buildingName, roomNumber, sensors]
      properties:
        roomKey:
          type: string
          example: Rectorate|412
        buildingName:
          type: string
          example: Rectorate
        roomNumber:
          type: string
          example: "412"
        sensors:
          type: array
          items:
            $ref: "#/components/schemas/SensorDto"

    GlobalSummaryDto:
      type: object
      required:
        - summaryKey
        - updatedAt
        - totalSensorsSeen
        - onlineSensorsCount
        - onlineSensorIdsCsv
        - roomsCo2WarningCount
        - roomsCo2CriticalCount
        - roomsTemperatureWarningCount
        - roomsTemperatureCriticalCount
        - roomsHumidityWarningCount
        - roomsHumidityCriticalCount
      properties:
        summaryKey:
          type: string
          example: global
        updatedAt:
          type: string
        totalSensorsSeen:
          type: integer
          format: int64
        onlineSensorsCount:
          type: integer
          format: int64
        onlineSensorIdsCsv:
          type: string
        roomsCo2WarningCount:
          type: integer
          format: int64
        roomsCo2CriticalCount:
          type: integer
          format: int64
        roomsTemperatureWarningCount:
          type: integer
          format: int64
        roomsTemperatureCriticalCount:
          type: integer
          format: int64
        roomsHumidityWarningCount:
          type: integer
          format: int64
        roomsHumidityCriticalCount:
          type: integer
          format: int64

    OverviewResponse:
      type: object
      required: [summary, onlineRoomsCount, onlineSensorsKeysCount]
      properties:
        summary:
          $ref: "#/components/schemas/GlobalSummaryDto"
        onlineRoomsCount:
          type: integer
          format: int64
        onlineSensorsKeysCount:
          type: integer
          format: int64

    RoomCurrentResponse:
      type: object
      required:
        - roomKey
        - buildingName
        - roomNumber
        - sensorId
        - ts
        - co2
        - temperature
        - humidity
        - co2Status
        - temperatureStatus
        - humidityStatus
        - overallAirStatus
      properties:
        roomKey:
          type: string
        buildingName:
          type: string
        roomNumber:
          type: string
        sensorId:
          type: string
        ts:
          type: string
        co2:
          type: integer
        temperature:
          type: number
          format: double
        humidity:
          type: number
          format: double
        co2Status:
          $ref: "#/components/schemas/ParamStatus"
        temperatureStatus:
          $ref: "#/components/schemas/ParamStatus"
        humidityStatus:
          $ref: "#/components/schemas/ParamStatus"
        overallAirStatus:
          $ref: "#/components/schemas/OverallStatus"

    SensorCurrentResponse:
      type: object
      required:
        - sensorId
        - roomKey
        - buildingName
        - roomNumber
        - ts
        - co2
        - temperature
        - humidity
        - co2Status
        - temperatureStatus
        - humidityStatus
        - overallAirStatus
      properties:
        sensorId:
          type: string
        roomKey:
          type: string
        buildingName:
          type: string
        roomNumber:
          type: string
        ts:
          type: string
        co2:
          type: integer
        temperature:
          type: number
          format: double
        humidity:
          type: number
          format: double
        co2Status:
          $ref: "#/components/schemas/ParamStatus"
        temperatureStatus:
          $ref: "#/components/schemas/ParamStatus"
        humidityStatus:
          $ref: "#/components/schemas/ParamStatus"
        overallAirStatus:
          $ref: "#/components/schemas/OverallStatus"

    AggregateSnapshotDto:
      type: object
      properties:
        period:
          type: string
          example: 1h
        roomKey:
          type: string
        buildingName:
          type: string
        roomNumber:
          type: string
        windowStart:
          type: string
        windowEnd:
          type: string
        co2Avg:
          type: number
          format: double
        temperatureAvg:
          type: number
          format: double
        humidityAvg:
          type: number
          format: double
        co2Status:
          $ref: "#/components/schemas/ParamStatus"
        temperatureStatus:
          $ref: "#/components/schemas/ParamStatus"
        humidityStatus:
          $ref: "#/components/schemas/ParamStatus"
        overallAirStatus:
          $ref: "#/components/schemas/OverallStatus"

    RoomAggregatesResponse:
      type: object
      required: [roomKey]
      properties:
        roomKey:
          type: string
        avg1m:
          $ref: "#/components/schemas/AggregateSnapshotDto"
        avg1h:
          $ref: "#/components/schemas/AggregateSnapshotDto"
        avg1d:
          $ref: "#/components/schemas/AggregateSnapshotDto"

    SeriesPointDto:
      type: object
      required: [bucket, co2Avg, temperatureAvg, humidityAvg]
      properties:
        bucket:
          type: string
        co2Avg:
          type: number
          format: double
        temperatureAvg:
          type: number
          format: double
        humidityAvg:
          type: number
          format: double

    SeriesResponse:
      type: object
      required: [entityType, entityId, from, to, step, points]
      properties:
        entityType:
          type: string
          enum: [room, sensor]
        entityId:
          type: string
        from:
          type: string
        to:
          type: string
        step:
          type: string
          enum: [minute, hour, day, month]
        points:
          type: array
          items:
            $ref: "#/components/schemas/SeriesPointDto"

    MetricStatsDto:
      type: object
      required: [avg, median, min, max, percentInNorm]
      properties:
        avg:
          type: number
          format: double
        median:
          type: number
          format: double
        min:
          type: number
          format: double
        max:
          type: number
          format: double
        percentInNorm:
          type: number
          format: double

    PeriodDto:
      type: object
      required: [from, to]
      properties:
        from:
          type: string
        to:
          type: string

    StatsResponse:
      type: object
      required: [entityType, entityId, period, co2, temperature, humidity]
      properties:
        entityType:
          type: string
          enum: [room, sensor]
        entityId:
          type: string
        buildingName:
          type: string
          nullable: true
        roomNumber:
          type: string
          nullable: true
        period:
          $ref: "#/components/schemas/PeriodDto"
        co2:
          $ref: "#/components/schemas/MetricStatsDto"
        temperature:
          $ref: "#/components/schemas/MetricStatsDto"
        humidity:
          $ref: "#/components/schemas/MetricStatsDto"