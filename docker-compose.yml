services:
  kafka:
    user: "0:0"
    image: confluentinc/cp-kafka:8.1.0
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_NODE_ID: "1"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://127.0.0.1:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

      KAFKA_NUM_PARTITIONS: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DELETE_TOPIC_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"

      KAFKA_MESSAGE_MAX_BYTES: "10485760"
      KAFKA_REPLICA_FETCH_MAX_BYTES: "10485760"

      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka-data:/var/lib/kafka/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/9094'" ]
      interval: 5s
      timeout: 3s
      retries: 30

  kafka-schema-registry:
    image: confluentinc/cp-schema-registry:8.1.0
    container_name: kafka-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "PLAINTEXT://kafka:9092"
      SCHEMA_REGISTRY_LISTENERS: "http://0.0.0.0:8081"
      SCHEMA_REGISTRY_HOST_NAME: "kafka-schema-registry"
    ports:
      - "8081:8081"
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8081/subjects >/dev/null" ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  kafka-connect:
    build:
      context: kafka-connect
    image: my-cp-kafka-connect:8.1.0
    container_name: kafka-connect
    hostname: kafka-connect
    depends_on:
      kafka:
        condition: service_healthy
      kafka-schema-registry:
        condition: service_healthy
    environment:
      CONNECT_BOOTSTRAP_SERVERS: "kafka:9092"
      CONNECT_REST_PORT: 8083
      CONNECT_REST_ADVERTISED_HOST_NAME: "kafka-connect"
      CONNECT_GROUP_ID: "connect-cluster"

      CONNECT_CONFIG_STORAGE_TOPIC: "__connect-configs"
      CONNECT_OFFSET_STORAGE_TOPIC: "__connect-offsets"
      CONNECT_STATUS_STORAGE_TOPIC: "__connect-status"

      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1

      CONNECT_KEY_CONVERTER: "org.apache.kafka.connect.storage.StringConverter"
      CONNECT_VALUE_CONVERTER: "io.confluent.connect.avro.AvroConverter"
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: "http://kafka-schema-registry:8081"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "true"
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"

      CONNECT_INTERNAL_KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_INTERNAL_VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_INTERNAL_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_INTERNAL_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"

      CONNECT_PLUGIN_PATH: "/usr/share/confluent-hub-components"
      CONNECT_LOG4J_ROOT_LOGLEVEL: "INFO"
    ports:
      - "8083:8083"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8083/connector-plugins >/dev/null" ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  kafka-ui:
    image: kafbat/kafka-ui:main
    depends_on:
      kafka:
        condition: service_healthy
      kafka-schema-registry:
        condition: service_healthy
      kafka-connect:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: "local"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: "http://kafka-schema-registry:8081"
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: "connect-local"
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: "http://kafka-connect:8083"
    ports:
      - "8080:8080"

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb
    hostname: timescaledb
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: avs
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d avs" ]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379"

  flink-jobmanager:
    build:
      context: flink
      dockerfile: Dockerfile
    image: my-flink:1.19.1-java17
    container_name: flink-jobmanager
    command: jobmanager
    ports:
      - "8180:8081"
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        rest.port: 8081
        parallelism.default: 1
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/overview >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  flink-taskmanager:
    build:
      context: flink
      dockerfile: Dockerfile
    image: my-flink:1.19.1-java17
    container_name: flink-taskmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
    depends_on:
      flink-jobmanager:
        condition: service_healthy

  flink-init:
    build:
      context: flink
      dockerfile: Dockerfile
    image: my-flink:1.19.1-java17
    depends_on:
      flink-jobmanager:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-schema-registry:
        condition: service_healthy
    volumes:
      - ./flink/init:/opt/flink/scripts:ro
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        rest.address: flink-jobmanager
        rest.port: 8081
    command: >
      bin/sql-client.sh embedded
      -f /opt/flink/scripts/avs_analytics.sql
    restart: "no"

  mqtt-broker-healthcheck:
    image: eclipse-mosquitto:2
    container_name: mqtt-broker-healthcheck
    command: [ "sh", "-c", "tail -f /dev/null" ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mosquitto_sub -h 2.26.119.75 -p 1883 -t '$$SYS/broker/version' -C 1 -W 5 > /dev/null 2>&1 || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  mqtt-web:
    image: emqx/mqttx-web:latest
    container_name: mqttx-web
    ports:
      - "8086:80"
    restart: unless-stopped

  sensor-emulator:
    build:
      context: mqtt/sensor-emulator
    container_name: sensor-emulator
    depends_on:
      mqtt-broker-healthcheck:
        condition: service_healthy
    environment:
      MQTT_HOST: 2.26.119.75
      MQTT_PORT: 1883
      MQTT_QOS: 1
      MQTT_CLIENT_ID: avs-emulator
      MQTT_TOPIC_TEMPLATE: sensors/room{roomNumber}/data
      SENSOR_MAP_FILE: /app/sensor_map.txt
      BACKFILL_ENABLED: "true"
      BACKFILL_FROM_YEAR: "2026"
      BACKFILL_INTERVAL_SEC: "36000"
      SENSOR_COUNT: 10
      SENSOR_SELECTION: first
      REALTIME_INTERVAL_SEC: 50
      TEMPERATURE_BASE: 43
      HUMIDITY_BASE: 95
      CO2_BASE: 1650
      TEMPERATURE_JITTER: 1.5
      HUMIDITY_JITTER: 7
      CO2_JITTER: 80
    volumes:
      - ./mqtt/sensor-emulator/sensor_map.txt:/app/sensor_map.txt:ro
    restart: unless-stopped

  connect-init:
    image: alpine/curl:latest
    depends_on:
      kafka-connect:
        condition: service_healthy
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      mqtt-broker-healthcheck:
        condition: service_healthy
    volumes:
      - ./kafka-connect/init:/init:ro
    environment:
      CONNECT_URL: http://kafka-connect:8083
    entrypoint: ["/bin/sh", "/init/init.sh"]
    restart: "no"

  avs-backend:
    build:
      context: ./avs-backend
      dockerfile: Dockerfile
    container_name: avs-backend
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

      SPRING_DATASOURCE_URL: jdbc:postgresql://timescaledb:5432/avs
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password

      APP_REDIS_KEYSPACE_GLOBAL_SUMMARY: avs:summary
      APP_REDIS_KEYSPACE_ROOM_LATEST: avs:room:latest
      APP_REDIS_KEYSPACE_ROOM_AVG_1M: avs:room:avg:1m
      APP_REDIS_KEYSPACE_ROOM_AVG_1H: avs:room:avg:1h
      APP_REDIS_KEYSPACE_ROOM_AVG_1D: avs:room:avg:1d
      APP_REDIS_KEYSPACE_SENSOR_LATEST: avs:sensor:latest
      APP_SENSOR_OFFLINE_AFTER: PT2M
    ports:
      - "8084:8084"
    restart: unless-stopped

volumes:
  kafka-data:
  postgres-data:

